# Checked-in defaults for open-source clones. Personalize safely:
#
# • Add config.override.yaml (see config.override.example.yaml) — gitignored; not on GitHub.
# • Or set Railway / shell vars: SMS_GREETING_NAME, SPOTIFY_SEED_PLAYLIST_IDS, FILM_TASTE,
#   FILM_TMDB_GENRE_IDS, SMS_QUIET_TIMEZONE — see README and .env.example.
#
preferences:
  film_taste: >
    Plain-language description of your film tastes for the discovery judge —
    genres, moods, directors you skew toward, and what you actively avoid.

  film_tmdb_genre_ids: [18, 53, 878] # Example: Drama, Thriller, Sci-Fi (adjust to suit you)

  quiet_hours:
    start: "22:00"
    end: "08:00"
    timezone: "America/Los_Angeles"
    behavior: queue
    max_batch: 3

  discovery_frequency: weekly
  tier1_announcement_search: true

  # User-owned Spotify playlist IDs for discovery seeds (Wrapped-style 37i9dQZF* playlists
  # are not reachable via Spotify Web API). Leave empty until you configure your own mirrors.
  spotify_seed_playlist_ids: []

watchlist:
  tv:
    shows: []
