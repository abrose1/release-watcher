# Cron schedules + module commands below. Builders also need a default start phase —
# root main.py + nixpacks.toml satisfy Nixpacks/Railpack; see README Deployment.
[build]
builder = "nixpacks"

[[services]]
name = "daily-scan"
type = "cron"
schedule = "0 14 * * *"
startCommand = "python -m watcher.jobs.watchlist"

[[services]]
name = "announcement-scan"
type = "cron"
schedule = "0 14 * * *"
startCommand = "python -m watcher.jobs.announcement"

[[services]]
name = "weekly-discovery"
type = "cron"
schedule = "0 15 * * 0"
startCommand = "python -m watcher.jobs.discovery"

[[services]]
name = "weekly-sync"
type = "cron"
schedule = "0 13 * * 0"
startCommand = "python -m watcher.sync_creators"

[[services]]
name = "sms-webhook"
type = "web"
startCommand = "gunicorn watcher.webhook:app --bind 0.0.0.0:$PORT --workers 2"
